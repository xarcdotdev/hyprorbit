# hyprorbit Keybindings Configuration
# Compatible with Hyprland keybind syntax
# Include in hyprland.conf with: source = ~/.config/hyprorbit/keybindings.conf

# ==========================================
# ORBIT MANAGEMNT
# ==========================================
# Cycle Through opened orbits
bind = $mainMod ALT, tab, exec, hyprorbit orbit next
bind = $mainMod ALT SHIFT, tab, exec, hyprorbit orbit prev

# Direct orbit switching with SUPER + SHIFT + number
bind = $mainMod ALT, 1, exec, hyprorbit orbit set alpha
bind = $mainMod ALT, 2, exec, hyprorbit orbit set beta
bind = $mainMod ALT, 3, exec, hyprorbit orbit set gamma
bind = $mainMod ALT, 4, exec, hyprorbit orbit set delta
bind = $mainMod ALT, 5, exec, hyprorbit orbit set epsilon
bind = $mainMod ALT, 6, exec, hyprorbit orbit set zeta
bind = $mainMod ALT, 7, exec, hyprorbit orbit set eta
bind = $mainMod ALT, 8, exec, hyprorbit orbit set theta
bind = $mainMod ALT, 9, exec, hyprorbit orbit set iota

# ==========================================
# MODULE CYCLING
# ==========================================
# Cycling Through Modules
bind = $mainMod, TAB, exec, hyprorbit module jump next
bind = $mainMod SHIFT, TAB, exec, hyprorbit module jump prev

bind = $mainMod CTRL, right, exec, hyprorbit module jump next
bind = $mainMod CTRL, left, exec, hyprorbit module jump prev

# ==========================================
# WINDOW MANAGEMENT WITH ORBITS
# ==========================================
# Move Window to next Module (no-follow)
bind = $mainMod CTRL SHIFT ALT, right, exec, hyprorbit window move current module:next
bind = $mainMod CTRL SHIFT ALT, left, exec, hyprorbit window move current module:prev

# Move Window to next Module (follow)
bind = $mainMod CTRL SHIFT, right, exec, hyprorbit window move current module:next --silent
bind = $mainMod CTRL SHIFT, left, exec, hyprorbit window move current module:prev --silent

# ==========================================
# MODULE JUMPING (No Focus-or-Launch)
# ==========================================
# Selecting specific Module in current orbit
bind = $mainMod, 1, exec, hyprorbit module jump flex
bind = $mainMod, 2, exec, hyprorbit module jump code
bind = $mainMod, 3, exec, hyprorbit module jump surf
bind = $mainMod, 5, exec, hyprorbit module jump comm
bind = $mainMod, 6, exec, hyprorbit module jump note
bind = $mainMod, 4, exec, hyprorbit module jump gfx
bind = $mainMod, 9, exec, hyprorbit module jump 1 #Temp
bind = $mainMod, 0, exec, hyprorbit module jump 2 #Temp2

# ==========================================
# MODULE FOCUS (Primary Hotkeys)
# ==========================================
# Core module access - focus or launch in current orbit
bind = $mainMod, B, exec, hyprorbit module focus surf
bind = $mainMod, X, exec, hyprorbit module focus code
bind = $mainMod, O, exec, hyprorbit module focus note

# Move current window to a new temporary orbit/module
bind = $mainMod, N, exec, hyprorbit window move current module:create

# ==========================================
# UTILITY COMMANDS
# ==========================================
# Quick status information
bind = $mainMod ALT, backspace, exec, notify-send "Current Orbit" "$(hyprorbit orbit get)"
bind = $mainMod SHIFT, backspace, exec, notify-send "Current Module" "$(hyprorbit module get)"

# Daemon management
bind = $mainMod SHIFT ALT CTRL, backspace, exec, hyprorbit daemon reload && notify-send "Hyprorbit: Reload Daemon"

# ==========================================
# LEGACY WORKSPACE COMPATIBILITY
# ==========================================
# Keep your existing workspace cycling for non-orbit usage
bind = $mainMod CTRL ALT, right, workspace, e+1
bind = $mainMod CTRL ALT, left, workspace, e-1

# Emergency workspace access (bypasses orbit system)
bind = $mainMod CTRL ALT, 1, workspace, 1
bind = $mainMod CTRL ALT, 2, workspace, 2
bind = $mainMod CTRL ALT, 3, workspace, 3
bind = $mainMod CTRL ALT, 4, workspace, 4
bind = $mainMod CTRL ALT, 5, workspace, 5

# ==========================================
# UTILITY COMMANDS
# ==========================================
# Quick status information
bind = $mainMod SHIFT, space, exec, notify-send "Current Orbit" "$(hyprorbit orbit get)"
bind = $mainMod SHIFT, m, exec, notify-send "Current Module" "$(hyprorbit module get)"

# Daemon management
bind = $mainMod SHIFT, r, exec, hyprorbit daemon reload

# ==========================================
# CONFIGURATION NOTES
# ==========================================

# Module mapping (customize in ~/.config/hyprorbit/config.yaml):
# - code:    Development environments (VSCode, IDEs)
# - comm:    Communication (Slack, Discord, Email)
# - gfx:     Graphics/Design (GIMP, Blender, Figma)
# - media:   Media consumption (Browser, Music, Video)
# - sys:     System administration (Terminal, Monitoring)
# - docs:    Documentation (Obsidian, Notion, PDFs)
# - browser: Dedicated web browsing
# - utils:   Utilities (Calculator, File manager)
# - backup:  Backup/sync applications
# - temp:    Temporary/scratch workspace

# Key advantages over legacy system:
# 1. Stable hotkeys across orbit contexts
# 2. Focus-or-launch semantics per module
# 3. Consistent workspace naming
# 4. Sub-5ms response time via daemon
# 5. Easy orbit switching without losing layout
