# Orbit definitions with names, labels, and colors
orbits:
  - name: "alpha"
    label: "α"
    color: "#BC83F9"
  - name: "beta"
    label: "β"
    color: "#F97583"
  - name: "gamma"
    label: "γ"
    color: "#85E89D"
  - name: "delta"
    label: "δ"
    color: "#FFAB70"

# Module definitions with focus rules
modules:
  code:
    focus:
      match: "class:^Code$"
      cmd: ["code"]
    seed:
      - match: "class:^Code$"
        cmd: ["code"]
      - match: "class:^(Alacritty|kitty)$"
        cmd: ["alacritty"]
  gfx:
    focus:
      match: "class:^(Firefox|Zen Browser)$"
      cmd: ["firefox"]
    seed:
      - match: "class:^(Firefox|Zen Browser)$"
        cmd: ["firefox"]
      - match: "class:^Gimp$"
        cmd: ["gimp"]
  comm:
    focus:
      match: "class:^Thunderbird$"
      cmd: ["thunderbird"]
    seed:
      - match: "class:^Thunderbird$"
        cmd: ["thunderbird"]
      - match: "class:^TelegramDesktop$"
        cmd: ["telegram-desktop"]
