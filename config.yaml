# Orbit definitions with names and labels (colors have no effect by default waybar only takes name(text) and label(alt) )
orbits:
  - name: "alpha"
    label: "α"
    color: "#BC83F9"
  - name: "beta"
    label: "β"
    color: "#F97583"
  - name: "gamma"
    label: "γ"
    color: "#85E89D"
  - name: "delta"
    label: "δ"
    color: "#FFAB70"
  - name: "epsilon"
    label: "ε"
    color: "#FFAB70"
  - name: "zeta"
    label: "ζ"
    color: "#FFAB70"
  - name: "theta"
    label: "η"
    color: "#FFAB70"
  - name: "iota"
    label: "ι"
    color: "#FFAB70"

# Module definitions with focus rules
modules:
  code:
    focus:
      logic: try-all
      rules:
        - match: "class:^code$"
          match: "class:^codium$"
          match: "class:^nvim$"
          cmd: ["code"]
        - match: "class:^(ghostty|Alacritty|kitty)$"
          cmd: ["ghostty", "new-window"]
        - match: "title:Hyprland Wiki"
          options: [move, float]
  gfx:
    focus:
      rules:
        - match: "class:^(Firefox|zen)$"
          cmd: ["zen-browser"]
  comm:
    focus:
      rules:
        - match: "class:^thunderbird$"
          cmd: ["thunderbird"]
  media:
    focus:
      rules:
        - match: "class:^(mpv)$"
          cmd: ["mpv"]
  surf:
    focus:
      rules:
        - match: "class:^zen"
          cmd: ["zen-browser"]

defaults:
  float: false
  move: true

orbit:
  switch_preference: last-active-first
  # orbit_cycle_mode: not-empty  # Optional: cycle populated orbits plus one empty fallback (default: all)

# Debug logging configuration
debug:
  enabled: false                       # Enable debug logging
  log_file: "/tmp/hyprorbit-debug.log" # Optional: defaults to /tmp/hyprorbit-debug.log
  dispatcher: false                    # Enable dispatcher-specific debug logs
  hyprctl: false                       # Enable hyprctl-specific debug logs
